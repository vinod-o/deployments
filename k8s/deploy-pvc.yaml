apiVersion: apps/v1
kind: Deployment
metadata:
  name: niginx-manual
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app1
  template:
    metadata:
      labels:
        app: nginx-app1
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: manual-storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: storage
          PersistentVolumeClaim:
            claimName: pvc-data
